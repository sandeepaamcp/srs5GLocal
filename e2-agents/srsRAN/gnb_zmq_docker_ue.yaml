# Docker-oriented gNB config for a containerized srsUE:
# - AMF connectivity stays on the srsRAN docker "ran" network
# - E2 connectivity stays on the oran-sc-ric docker network
# - ZMQ sample transport uses container-to-container IPs instead of loopback

ran_node_name: cu_cp_01
gnb_id: 411
gnb_id_bit_length: 22
gnb_cu_up_id: 0
gnb_du_id: 0

cu_cp:
  amf:
    addr: 10.53.1.2
    port: 38412
    bind_addr: 10.53.1.3
    supported_tracking_areas:
      - tac: 7
        plmn_list:
          - plmn: "00101"
            tai_slice_support_list:
              - sst: 1
  inactivity_timer: 7200

ru_sdr:
  device_driver: zmq
  # For Docker, gNB publishes its TX stream on 2000 and connects to the UE TX stream on 2001.
  device_args: tx_port=tcp://0.0.0.0:2000,rx_port=tcp://10.53.1.4:2001,base_srate=11.52e6
  srate: 11.52
  tx_gain: 75
  rx_gain: 75

cell_cfg:
  dl_arfcn: 368500
  band: 3
  channel_bandwidth_MHz: 10
  common_scs: 15
  plmn: "00101"
  tac: 7
  slicing:
    - sst: 1
      sched_cfg:
        min_prb_policy_ratio: 0
        max_prb_policy_ratio: 100
  pdcch:
    common:
      ss0_index: 0
      coreset0_index: 6
    dedicated:
      ss2_type: common
      dci_format_0_1_and_1_1: false
  prach:
    prach_config_index: 1
  pdsch:
    mcs_table: qam64
  pusch:
    mcs_table: qam64

log:
  filename: /tmp/gnb.log
  all_level: info
  hex_max_size: 0

pcap:
  mac_enable: false
  mac_filename: /tmp/gnb_mac.pcap
  ngap_enable: false
  ngap_filename: /tmp/gnb_ngap.pcap
  e2ap_enable: true
  e2ap_du_filename: /tmp/gnb_du_e2ap.pcap
  e2ap_cu_cp_filename: /tmp/gnb_cu_cp_e2ap.pcap
  e2ap_cu_up_filename: /tmp/gnb_cu_up_e2ap.pcap

e2:
  enable_du_e2: true
  enable_cu_cp_e2: false
  enable_cu_up_e2: false
  e2sm_kpm_enabled: true
  e2sm_rc_enabled: true
  e2sm_ccc_enabled: true
  addr: 10.0.2.10
  bind_addr: 10.0.2.30
  port: 36421

metrics:
  autostart_stdout_metrics: true
  enable_log: false
  enable_json: true

  periodicity:
    du_report_period: 1000
    cu_up_report_period: 1000
    cu_cp_report_period: 1000

  layers:
    enable_ru: false
    enable_sched: true
    enable_rlc: true
    enable_mac: true
    enable_pdcp: false
    enable_du_low: false

remote_control:
  bind_addr: 0.0.0.0
  enabled: true
