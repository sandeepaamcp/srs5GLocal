services:
  gnb:
    volumes:
      - gnb-storage:/tmp
    configs:
      - gnb_config.yml
    networks:
      ran:
        ipv4_address: ${GNB_IP:-10.53.1.3}
      metrics:
        ipv4_address: 172.19.1.3
      ric:
        ipv4_address: 10.0.2.30

configs:
  gnb_config.yml:
    file: ../../e2-agents/srsRAN/gnb_zmq_docker_ric.yaml

networks:
  ric:
    external: true
    name: oran-sc-ric_ric_network
